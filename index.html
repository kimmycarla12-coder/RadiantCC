<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CC Payment Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #eeece8;
    --border: #e0ddd7;
    --text: #1a1916;
    --text2: #6b6860;
    --text3: #9c9a95;
    --accent: #2d5be3;
    --accent-light: #edf0fd;
    --amex-bg: #fff8e6; --amex-text: #7a5500;
    --chase-bg: #e8f4ed; --chase-text: #1a5c35;
    --capital-bg: #fdeee6; --capital-text: #7a3010;
    --citi-bg: #f0e8f8; --citi-text: #5a1a7a;
    --other-bg: #e8edf8; --other-text: #1a2e6b;
    --today-ring: #2d5be3;
    --danger: #c93535;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text2); letter-spacing: 0.05em; }
  .logo span { color: var(--accent); font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* ── CONTROLS ── */
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-label { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; min-width: 160px; text-align: center; }
  button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: var(--surface2); border-color: #ccc; }
  button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  button.icon-btn { padding: 7px 10px; }

  select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }

  /* ── MAIN LAYOUT ── */
  main { max-width: 1100px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .filter-bar label { font-size: 12px; color: var(--text2); font-family: 'DM Mono', monospace; }
  .filter-bar input[type=number] {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    width: 90px;
  }
  .view-toggle { display: flex; gap: 4px; margin-left: auto; }

  /* ── SUMMARY CARDS ── */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .stat-card .s-label { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .stat-card .s-val { font-size: 26px; font-weight: 300; color: var(--text); }
  .stat-card .s-val.money { font-family: 'DM Mono', monospace; font-size: 20px; }

  /* ── CALENDAR ── */
  .cal-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .day-headers { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); border-bottom: 1px solid var(--border); }
  .day-hdr { text-align: center; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text3); padding: 10px 0; letter-spacing: 0.05em; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); }
  .day-cell {
    min-height: 90px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 6px;
    position: relative;
    transition: background 0.1s;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell.other-month { background: var(--bg); }
  .day-cell.today { background: var(--accent-light); }
  .day-cell.has-payments:hover { background: var(--surface2); cursor: pointer; }
  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .today .day-num .num { background: var(--accent); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
  .pill {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: opacity 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .pill:hover { opacity: 0.78; }
  .pill.amex { background: var(--amex-bg); color: var(--amex-text); }
  .pill.chase { background: var(--chase-bg); color: var(--chase-text); }
  .pill.capital { background: var(--capital-bg); color: var(--capital-text); }
  .pill.citi { background: var(--citi-bg); color: var(--citi-text); }
  .pill.other { background: var(--other-bg); color: var(--other-text); }
  .pill .pill-amt { font-family: 'DM Mono', monospace; font-size: 9px; opacity: 0.8; flex-shrink: 0; }
  .more-badge { font-size: 10px; color: var(--text3); padding: 1px 0; cursor: pointer; }
  .more-badge:hover { color: var(--accent); }

  /* ── LIST VIEW ── */
  .list-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; }
  .list-wrap.active { display: block; }
  .cal-wrap.active { display: block; }
  .cal-wrap:not(.active) { display: none; }
  .list-header {
    display: grid;
    grid-template-columns: 100px 1fr 90px 110px 100px;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .list-row {
    display: grid;
    grid-template-columns: 100px 1fr 90px 110px 100px;
    gap: 8px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.1s;
    cursor: pointer;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: var(--surface2); }
  .list-date { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text2); }
  .list-card { font-size: 13px; font-weight: 500; }
  .list-holder { font-size: 12px; color: var(--text2); }
  .list-pay { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-amt { font-family: 'DM Mono', monospace; font-size: 13px; text-align: right; }
  .zero { color: var(--text3); }
  .nonzero { color: var(--text); font-weight: 500; }
  .bank-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; flex-shrink: 0; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,25,22,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 460px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
  }
  .modal-head h2 { font-size: 15px; font-weight: 500; }
  .modal-head .total { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--accent); }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text3); padding: 0 4px; }
  .close-btn:hover { color: var(--text); }
  .modal-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 4px 12px;
    align-items: start;
  }
  .modal-item:last-child { border-bottom: none; }
  .mi-card { font-size: 13px; font-weight: 500; grid-column: 1; }
  .mi-amt { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; grid-column: 2; grid-row: 1 / 3; align-self: center; text-align: right; }
  .mi-meta { font-size: 11px; color: var(--text2); grid-column: 1; }
  .mi-pay { font-size: 11px; color: var(--text3); grid-column: 1; margin-top: 2px; }
  .bank-chip {
    display: inline-block;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    margin-right: 4px;
  }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    main { padding: 16px 12px 60px; }
    .day-cell { min-height: 60px; padding: 4px 3px; }
    .list-header, .list-row { grid-template-columns: 80px 1fr 80px; }
    .list-header .lh-pay, .list-header .lh-payvia,
    .list-row .list-pay, .list-row .list-holder { display: none; }
    .filter-bar { gap: 6px; }
  }
</style>
</head>

<header>
  <div class="logo">CC <span>Payment</span> Calendar</div>
  <div class="header-right">
    <div class="month-nav">
      <button class="icon-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-label" id="month-label"></div>
      <button class="icon-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <button onclick="goToday()">Today</button>
  </div>
</header>

<main>
  <div class="filter-bar">
    <label>HOLDER</label>
    <select id="f-holder" onchange="render()">
      <option value="">All</option>
      <option>AK</option><option>SK</option><option>RK</option><option>MK</option><option>AN</option><option>PK</option>
    </select>
    <label>NETWORK</label>
    <select id="f-bank" onchange="render()">
      <option value="">All</option>
      <option>Amex</option><option>Chase</option><option>Capital One</option><option>Citi</option><option>Other</option>
    </select>
    <label>MIN $</label>
    <input type="number" id="f-min" placeholder="0" style="width:80px" oninput="render()" />
    <div class="view-toggle">
      <button id="btn-cal" class="active" onclick="setView('cal')">Calendar</button>
      <button id="btn-list" onclick="setView('list')">List</button>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="cal-wrap active" id="cal-view">
    <div class="day-headers" id="day-headers"></div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="list-wrap" id="list-view">
    <div class="list-header">
      <span>DUE DATE</span>
      <span>CARD</span>
      <span>HOLDER</span>
      <span class="lh-payvia">PAY VIA</span>
      <span style="text-align:right">AMOUNT</span>
    </div>
    <div id="list-body"></div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2 id="modal-date"></h2>
      <span class="total" id="modal-total"></span>
      <button class="close-btn" onclick="closeModal()">&#215;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function bankClass(card) {
  if (card.startsWith('Amex')) return 'amex';
  if (card.startsWith('Chase')) return 'chase';
  if (card.startsWith('Capital')) return 'capital';
  if (card.startsWith('Citi')) return 'citi';
  return 'other';
}
function bankDot(card) {
  const map = {amex:'#c9940a',chase:'#1a8a47',capital:'#c94010',citi:'#8a1ac9',other:'#1a3099'};
  return map[bankClass(card)]||'#888';
}

function getFiltered() {
  const h = document.getElementById('f-holder').value;
  const b = document.getElementById('f-bank').value;
  const mn = parseFloat(document.getElementById('f-min').value)||0;
  const bMap = {'Amex':'amex','Chase':'chase','Capital One':'capital','Citi':'citi','Other':'other'};
  return PAYMENTS.filter(p => {
    if (!p.due) return false;
    if (h && p.holder !== h) return false;
    if (b && bankClass(p.card) !== bMap[b]) return false;
    if (p.amount < mn) return false;
    return true;
  });
}

function byDate(data) {
  const m = {};
  data.forEach(p => { if (!m[p.due]) m[p.due]=[]; m[p.due].push(p); });
  return m;
}

function fmtAmt(n) {
  return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtAmtShort(n) {
  if (n===0) return '$0';
  if (n>=1000) return '$'+(n/1000).toFixed(1)+'k';
  return '$'+Math.round(n);
}

function render() {
  const data = getFiltered();
  const dm = byDate(data);
  renderSummary(data);
  renderCal(dm);
  renderList(data);
  window._dm = dm;
}

function renderSummary(data) {
  const mStr = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
  const thisMonth = data.filter(p=>p.due.startsWith(mStr));
  const withBal = thisMonth.filter(p=>p.amount>0);
  const total = thisMonth.reduce((s,p)=>s+p.amount,0);
  const todayStr = fmtDate(TODAY);
  const upcoming = data.filter(p=>p.due>=todayStr && p.due<=mStr+'-31');
  document.getElementById('summary').innerHTML = `
    <div class="stat-card"><div class="s-label">Cards This Month</div><div class="s-val">${thisMonth.length}</div></div>
    <div class="stat-card"><div class="s-label">With Balance</div><div class="s-val">${withBal.length}</div></div>
    <div class="stat-card"><div class="s-label">Total Due</div><div class="s-val money">${fmtAmt(total)}</div></div>
    <div class="stat-card"><div class="s-label">Upcoming (this month)</div><div class="s-val">${upcoming.length}</div></div>
  `;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderCal(dm) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('day-headers').innerHTML = days.map(d=>`<div class="day-hdr">${d}</div>`).join('');
  const first = new Date(curYear,curMonth,1);
  const last = new Date(curYear,curMonth+1,0);
  const startDay = first.getDay();
  let cells = '';
  for (let i=0;i<startDay;i++) {
    const d = new Date(curYear,curMonth,1-startDay+i);
    cells += `<div class="day-cell other-month"><div class="day-num"><span class="num">${d.getDate()}</span></div></div>`;
  }
  for (let d=1;d<=last.getDate();d++) {
    const dt = new Date(curYear,curMonth,d);
    const key = fmtDate(dt);
    const isToday = dt.getTime()===TODAY.getTime();
    const entries = dm[key]||[];
    const hasPay = entries.length>0;
    const show = entries.slice(0,3);
    const more = entries.length-3;
    const numEl = isToday ? `<span class="num" style="background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;">${d}</span>` : `<span class="num">${d}</span>`;
    cells += `<div class="day-cell${isToday?' today':''}${hasPay?' has-payments':''}" ${hasPay?`onclick="openModal('${key}')"`:''}>
      <div class="day-num">${numEl}</div>
      ${show.map(p=>`<div class="pill ${bankClass(p.card)}" onclick="event.stopPropagation();openModal('${key}')">
        <span style="overflow:hidden;text-overflow:ellipsis;">${p.card.replace(/^(Amex|Chase|Capital One|Citi) ?/,'')}&thinsp;·&thinsp;${p.holder}</span>
        ${p.amount>0?`<span class="pill-amt">${fmtAmtShort(p.amount)}</span>`:''}
      </div>`).join('')}
      ${more>0?`<div class="more-badge" onclick="event.stopPropagation();openModal('${key}')">+${more} more</div>`:''}
    </div>`;
  }
  const total = startDay+last.getDate();
  const rem = (7-total%7)%7;
  for (let i=1;i<=rem;i++) cells += `<div class="day-cell other-month"><div class="day-num"><span class="num">${i}</span></div></div>`;
  document.getElementById('cal-grid').innerHTML = cells;
  document.getElementById('month-label').textContent = new Date(curYear,curMonth,1).toLocaleString('default',{month:'long',year:'numeric'});
}

function renderList(data) {
  const mStr = `${curYear}-${String(curMonth+1).padStart(2,'0')}`;
  const visible = data.filter(p=>p.due.startsWith(mStr)).sort((a,b)=>a.due.localeCompare(b.due));
  if (!visible.length) { document.getElementById('list-body').innerHTML='<div class="empty">No payments found for this month.</div>'; return; }
  document.getElementById('list-body').innerHTML = visible.map(p=>`
    <div class="list-row" onclick="openModal('${p.due}')">
      <div class="list-date">${new Date(p.due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      <div class="list-card">
        <span class="bank-dot" style="background:${bankDot(p.card)}"></span>${p.card}${p.biz?` <span style="font-weight:300;color:var(--text2);font-size:12px;">· ${p.biz}</span>`:''}
      </div>
      <div class="list-holder">${p.holder} ···${p.digits.slice(-4)}</div>
      <div class="list-pay">${p.paidWith||'—'}</div>
      <div class="list-amt ${p.amount>0?'nonzero':'zero'}">${fmtAmt(p.amount)}</div>
    </div>
  `).join('');
}

function openModal(key) {
  const entries = (window._dm||{})[key]||[];
  const dt = new Date(key+'T00:00:00');
  const total = entries.reduce((s,p)=>s+p.amount,0);
  document.getElementById('modal-date').textContent = dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('modal-total').textContent = total>0?fmtAmt(total):'';
  document.getElementById('modal-body').innerHTML = entries.map(p=>`
    <div class="modal-item">
      <div class="mi-card">
        <span class="bank-chip ${p.card.startsWith('Amex')?'amex':p.card.startsWith('Chase')?'chase':p.card.startsWith('Capital')?'capital':p.card.startsWith('Citi')?'citi':'other'}" style="background:${bankDot(p.card)}18;color:${bankDot(p.card)}">${bankClass(p.card).toUpperCase()}</span>${p.card}
      </div>
      <div class="mi-amt ${p.amount>0?'nonzero':'zero'}">${fmtAmt(p.amount)}</div>
      <div class="mi-meta">···${p.digits.slice(-4)} &nbsp;·&nbsp; ${p.holder}${p.biz?' &nbsp;·&nbsp; '+p.biz:''}</div>
      ${p.paidWith?`<div class="mi-pay">Pay via: ${p.paidWith}</div>`:''}
      ${p.closing?`<div class="mi-pay">Closing: ${new Date(p.closing+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`:''}
    </div>
  `).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target===document.getElementById('modal-overlay')) closeModal(); }

function changeMonth(dir) {
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
}
function goToday() { curYear=TODAY.getFullYear(); curMonth=TODAY.getMonth(); render(); }
function setView(v) {
  document.getElementById('cal-view').classList.toggle('active', v==='cal');
  document.getElementById('list-view').classList.toggle('active', v==='list');
  document.getElementById('btn-cal').classList.toggle('active', v==='cal');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
}

render();
</script>
</body>
</html>
